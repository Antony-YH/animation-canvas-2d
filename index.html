<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Círculos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

<nav class="navbar navbar-dark glass">
  <div class="container">
    <span class="navbar-brand">Canvas Physics</span>
  </div>
</nav>

<div class="container my-4">
  <div class="row g-3 glass p-4 rounded">
    <h4 class="mb-3">Controles</h4>
    <div class="col-md-2">
      <label>Círculos</label>
      <input type="number" id="cantidad" class="form-control" value="5">
    </div>

    <div class="col-md-2">
      <label>Ancho</label>
      <input type="number" id="ancho" class="form-control" value="800">
    </div>

    <div class="col-md-2">
      <label>Alto</label>
      <input type="number" id="alto" class="form-control" value="400">
    </div>

    <div class="col-md-3">
      <label>Efecto</label>
      <select id="efecto" class="form-control">
        <option value="top-left">Sup. Izquierda</option>
        <option value="top-right">Sup. Derecha</option>
        <option value="bottom-left">Inf. Izquierda</option>
        <option value="bottom-right">Inf. Derecha</option>
        <option value="top">Desde arriba</option>
        <option value="bottom">Desde abajo</option>
      </select>
    </div>

    <div class="col-md-3">
      <label>Modo</label>
      <select id="modo" class="form-control">
        <option value="fisica">Con gravedad</option>
        <option value="clasico">Rebote infinito</option>
      </select>
    </div>

    <div class="col-md-12">
      <button id="generar" class="btn btn-primary w-100">Aplicar</button>
    </div>

  </div>
</div>

<div class="container text-center">
  <canvas id="canvas" class="glass"></canvas>
</div>

<footer class="text-center mt-5 p-3 glass">
  <p>Desarrollado por Antonio Yañez 💻 | 2026</p>
</footer>

<script src="./assets/js/main.js"></script>
</body>
</html>
