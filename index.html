<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Círculos | Canvas Physics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">

  <style>
    /* Pequeños ajustes para que los componentes de Bootstrap 
       no rompan tu estética original de cristal */
    .form-control, .form-select {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
    }
    .form-control:focus, .form-select:focus {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
    }
    label {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 4px;
      opacity: 0.9;
    }
    option { background: #222; color: white; }
    
    .navbar-brand { font-weight: bold; letter-spacing: 1px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark glass shadow-sm mb-4">
  <div class="container">
    <span class="navbar-brand text-uppercase">
      ✨ Canvas Glass App
    </span>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-xl-11">
      
      <div class="glass p-4 rounded-4 mb-4">
        <div class="d-flex align-items-center mb-4">
          <h5 class="mb-0">Generador de circulos con gravedad</h5>
        </div>

        <div class="row g-3">
          <div class="col-6 col-md-2">
            <label for="cantidad">Círculos</label>
            <input type="number" id="cantidad" class="form-control" value="5" min="1" max="100">
          </div>

          <div class="col-6 col-md-2">
            <label for="ancho">Ancho (px)</label>
            <input type="number" id="ancho" class="form-control" value="800">
          </div>

          <div class="col-6 col-md-2">
            <label for="alto">Alto (px)</label>
            <input type="number" id="alto" class="form-control" value="400">
          </div>

          <div class="col-6 col-md-3">
            <label for="efecto">Punto de Aparición</label>
            <select id="efecto" class="form-select">
              <option value="top-left">↖️ Sup. Izquierda</option>
              <option value="top-right">↗️ Sup. Derecha</option>
              <option value="bottom-left">↙️ Inf. Izquierda</option>
              <option value="bottom-right">↘️ Inf. Derecha</option>
              <option value="top">⬇️ Desde arriba</option>
              <option value="bottom">⬆️ Desde abajo</option>
            </select>
          </div>

          <div class="col-12 col-md-3">
            <label for="modo">Modo de Vuelo</label>
            <select id="modo" class="form-select">
              <option value="fisica">🍎 Gravedad Realista</option>
              <option value="clasico">♾️ Rebote Infinito</option>
            </select>
          </div>

          <div class="col-12 mt-4">
            <button id="generar" class="btn btn-primary w-100 py-2 fw-bold shadow-sm rounded-3">
              APLICAR SIMULACIÓN
            </button>
          </div>
        </div>
      </div>

      <div class="text-center overflow-auto pb-4">
        <canvas id="canvas" class="glass shadow-lg"></canvas>
      </div>

    </div>
  </div>
</div>

<footer class="text-center mt-auto p-4 glass" style="border-radius: 25px 25px 0 0; border-bottom: none;">
  <div class="container">
    <p class="mb-0">
      Desarrollado por <strong>Antonio Yañez Hernandez</strong> | 2026
    </p>
  </div>
</footer>

<script src="./assets/js/main.js"></script>
</body>
</html>
