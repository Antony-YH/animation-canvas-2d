<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Círculos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark glass">
  <div class="container">
    <a class="navbar-brand" href="#">Canvas App</a>
  </div>
</nav>

<!-- 🔷 CONTROLES -->
<div class="container my-4">
  <div class="row g-3 glass p-4 rounded">

    <div class="col-md-3">
      <label>Círculos</label>
      <input type="number" id="cantidad" class="form-control" value="5" min="1" max="100">
    </div>

    <div class="col-md-3">
      <label>Ancho Canvas</label>
      <input type="number" id="ancho" class="form-control" value="800">
    </div>

    <div class="col-md-3">
      <label>Alto Canvas</label>
      <input type="number" id="alto" class="form-control" value="400">
    </div>

    <div class="col-md-3 d-flex align-items-end">
      <button id="generar" class="btn btn-primary w-100">Aplicar</button>
    </div>

  </div>
</div>

<!-- 🔷 CANVAS -->
<div class="container text-center">
  <canvas id="canvas" class="glass"></canvas>
</div>

<!-- 🔷 FOOTER -->
<footer class="text-center mt-5 p-3 glass">
  <p>Desarrollado por Antonio Yañez 💻 | 2026</p>
</footer>

<script src="./assets/js/main.js"></script>
</body>
</html>
